<header class="header">
  <div class="header-left">
    <app-breadcrumbs></app-breadcrumbs>
  </div>

  <div class="header-actions">
    <!-- Live indicator -->
    <div class="live-indicator">
      <span class="live-dot"></span>
      <span class="live-label">Live</span>
    </div>

    <app-theme-toggle />
    <app-location-dropdown />

    <!-- Search button -->
    <button class="icon-btn" type="button" aria-label="Search">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="6.5" cy="6.5" r="4.5"/><path d="M10 10l3.5 3.5"/>
      </svg>
    </button>

    <!-- Notifications button -->
    <div class="notif-wrap">
      <button class="icon-btn alert" type="button" aria-label="Notifications">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 7A5 5 0 103 7c0 2 .5 3 1 3.5H2l1 2h10l1-2h-2C13.5 10 13 9 13 7z"/>
        </svg>
        <span class="notif-dot">3</span>
      </button>
    </div>

    <!-- Avatar / user menu -->
    <div class="avatar-wrap">
      <button class="avatar" type="button"
              [attr.aria-label]="'User menu for ' + currentUser?.name"
              (click)="toggleDropdown()">
        {{ currentUser?.initials ?? '?' }}
      </button>

      @if (dropdownOpen()) {
        <div class="dropdown" role="menu">
          <div class="dropdown-user">
            <span class="dropdown-name">{{ currentUser?.name }}</span>
            <span class="dropdown-email">{{ currentUser?.email }}</span>
          </div>
          <hr class="dropdown-divider" />
          <button class="dropdown-item" type="button" role="menuitem" (click)="logout()">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6"/>
            </svg>
            Log out
          </button>
        </div>
      }
    </div>
  </div>
</header>
