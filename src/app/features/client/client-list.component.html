<div class="page">
  <app-page-header
    [breadcrumb]="'Client'"
    [title]="'Client List'"
    [subtitle]="'Manage all your clients'"
    [actions]="headerActions"
  ></app-page-header>

  <div class="page-content">
    <div class="card">
      <app-data-table
        [columns]="columns"
        [data]="clients()"
        [loading]="loading()"
        [emptyMessage]="'No clients available'"
        (edit)="openEditDialog($event)"
        (delete)="confirmDelete($event)"
        (rowClick)="openOutlets($event)"
      ></app-data-table>
    </div>
  </div>
</div>
