<app-modal [title]="title" [subtitle]="subtitle" size="md" [hasIcon]="true" (closeRequested)="close()">

  <svg icon viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="9" cy="7" r="4"/>
    <path d="M2 16c0-3.3 3.1-6 7-6s7 2.7 7 6"/>
  </svg>

  <form [formGroup]="form" (ngSubmit)="save()">

    <div class="form-section-label">Segment Details</div>

    <div class="form-group">
      <label class="form-label">Segment Name <span class="required">*</span></label>
      <input formControlName="name" class="form-input" placeholder="e.g. Premium Users"
        [class.ng-invalid]="form.get('name')?.invalid && form.get('name')?.touched"
        [class.ng-touched]="form.get('name')?.touched" />
      @if (form.get('name')?.hasError('required') && form.get('name')?.touched) {
        <span class="form-error">Name is required</span>
      }
    </div>

    <div class="form-group">
      <label class="form-label">Description <span class="optional">(optional)</span></label>
      <textarea formControlName="description" class="form-textarea" rows="2" placeholder="Describe who belongs to this segment"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Segment URI <span class="optional">(optional)</span></label>
      <input formControlName="segment_uri" class="form-input" placeholder="auto-generated-from-name" />
      <span class="form-hint">Leave blank to auto-generate from name</span>
    </div>

    <div class="form-divider"></div>
    <div class="form-section-label">Configuration</div>

    <div class="form-row cols-2">
      <div class="form-group">
        <label class="form-label">Priority</label>
        <input formControlName="priority" class="form-input" type="number" min="0" placeholder="0" />
        <span class="form-hint">Higher number = higher priority</span>
      </div>
      <div class="form-group">
        <label class="form-label">Parent Segment <span class="optional">(optional)</span></label>
        <select formControlName="parent_id" class="form-select">
          <option [value]="null">— None —</option>
          @for (seg of segments(); track seg.id) {
            <option [value]="seg.id">{{ seg.name }}</option>
          }
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Criteria <span class="optional">(optional)</span></label>
      <textarea formControlName="criteria" class="form-textarea" rows="3" placeholder="e.g. order_count > 10 AND total_spend > 5000"></textarea>
      <span class="form-hint">Rule expression to auto-match users into this segment</span>
    </div>

  </form>

  <button footer class="btn-save" type="button" (click)="save()" [disabled]="form.invalid">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 7l4 4 6-6"/></svg>
    {{ isEdit() ? 'Save Changes' : 'Create Segment' }}
  </button>

</app-modal>
