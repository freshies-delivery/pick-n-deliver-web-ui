<div class="page">
  <app-page-header
    [breadcrumb]="'User View / Users'"
    [title]="'Ratings'"
    [subtitle]="'Ratings given by ' + userLabel()"
  />

  <!-- Tab Navigation -->
  <div class="user-tabs">
    <a class="user-tab" [routerLink]="['/dashboard/users', userId(), 'overview']" routerLinkActive="active">Dashboard</a>
    <a class="user-tab" [routerLink]="['/dashboard/users', userId(), 'orders']" routerLinkActive="active">Orders</a>
    <a class="user-tab" [routerLink]="['/dashboard/users', userId(), 'addresses']" routerLinkActive="active">Addresses</a>
    <a class="user-tab" [routerLink]="['/dashboard/users', userId(), 'ratings']" routerLinkActive="active">Ratings</a>
    <a class="user-tab" [routerLink]="['/dashboard/users', userId(), 'activity']" routerLinkActive="active">Activity</a>
  </div>

  <div class="ratings-content">
    <app-rating-sidebar
      [ratings]="ratings()"
      [activeFilter]="activeFilter()"
      (filterChange)="activeFilter.set($event)"
    />
    <app-rating-feed
      [ratings]="filteredRatings()"
      [loading]="loading()"
      (deleteRequest)="requestDelete($event)"
    />
  </div>
</div>
