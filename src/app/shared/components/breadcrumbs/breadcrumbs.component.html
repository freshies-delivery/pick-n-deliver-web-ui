<nav class="breadcrumbs" aria-label="Breadcrumb">
  @for (item of items; track item.label; let isLast = $last) {
    @if (item.link && !isLast) {
      <a [routerLink]="item.link">{{ item.label }}</a>
    } @else {
      <span>{{ item.label }}</span>
    }

    @if (!isLast) {
      <mat-icon>chevron_right</mat-icon>
    }
  }
</nav>
