<div class="page">
  <app-page-header
    [breadcrumb]="'User View'"
    [title]="'Users'"
    [subtitle]="'Manage users — click a row to view orders'"
    [actions]="headerActions"
  ></app-page-header>

  <div class="page-content">
    <div class="card">
      <app-data-table
        [columns]="columns"
        [data]="users()"
        [loading]="loading()"
        [emptyMessage]="'No users found. Add one to get started.'"
        (edit)="openEditDialog($event)"
        (delete)="confirmDelete($event)"
        (rowClick)="openUserOrders($event)"
      ></app-data-table>
    </div>
  </div>
</div>
