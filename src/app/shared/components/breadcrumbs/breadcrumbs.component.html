<nav class="breadcrumbs" aria-label="Breadcrumb">
  <ng-container *ngFor="let crumb of breadcrumbs$ | async">
    <a *ngIf="!crumb.isLast" [routerLink]="crumb.route" class="breadcrumb-link">
      {{ crumb.label }}
    </a>
    <span *ngIf="crumb.isLast" class="breadcrumb-current">{{ crumb.label }}</span>
    <span *ngIf="!crumb.isLast" class="breadcrumb-sep">/</span>
  </ng-container>
</nav>
