<div class="page">
  <app-page-header
    [breadcrumb]="'User View / Users'"
    [title]="'Addresses'"
    [subtitle]="'Delivery addresses for ' + userLabel()"
    [actions]="headerActions"
  ></app-page-header>

  <div class="user-tabs">
    <a class="user-tab" [routerLink]="['/dashboard/users', userId(), 'orders']" routerLinkActive="active">Orders</a>
    <a class="user-tab" [routerLink]="['/dashboard/users', userId(), 'addresses']" routerLinkActive="active">Addresses</a>
    <a class="user-tab" [routerLink]="['/dashboard/users', userId(), 'ratings']" routerLinkActive="active">Ratings</a>
  </div>

  <div class="page-content">
    <div class="card">
      <app-data-table
        [columns]="columns"
        [data]="addresses()"
        [loading]="loading()"
        [clickableRows]="false"
        [emptyMessage]="'No addresses found for this user'"
        (edit)="openEditDialog($event)"
        (delete)="confirmDelete($event)"
      ></app-data-table>
    </div>
  </div>
</div>
