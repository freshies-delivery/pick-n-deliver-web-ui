<div class="page outlet-detail-page" @fadeIn>
  <app-page-header
    [breadcrumb]="clientLabel + ' / Outlets'"
    [title]="outletName"
    [subtitle]="'Manage categories, address, and ratings'"
    [actions]="headerActions"
  />

  <div class="tab-bar">
    @for (tab of tabs; track tab.key) {
      <button
        type="button"
        class="tab"
        [class.active]="activeTab() === tab.key"
        [attr.aria-selected]="activeTab() === tab.key"
        (click)="setTab(tab.key)"
      >
        {{ tab.label }}
      </button>
    }
  </div>

  <div class="tab-content">
    @if (activeTab() === 'address') {
      <app-outlet-address [outletId]="outletId()" />
    }

    @if (activeTab() === 'categories') {
      <app-category-list
        [outletId]="outletId()"
        (openItems)="openCategoryItems($event)"
      />
    }

    @if (activeTab() === 'ratings') {
      <app-outlet-ratings [outletId]="outletId()" />
    }

    @if (activeTab() === 'dashboard') {
      <app-outlet-dashboard [outletId]="outletId()" />
    }

    @if (activeTab() === 'orders') {
      <app-outlet-orders [outletId]="outletId()" />
    }
  </div>
</div>
