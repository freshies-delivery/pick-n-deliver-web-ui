<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content [formGroup]="form" class="dialog-content">
  @for (field of data.fields; track field.key) {
    @if (field.type === 'checkbox') {
      <mat-checkbox [formControlName]="field.key">{{ field.label }}</mat-checkbox>
    } @else {
      <mat-form-field appearance="outline">
        <mat-label>{{ field.label }}</mat-label>

        @if (field.type === 'textarea') {
          <textarea matInput rows="3" [formControlName]="field.key"></textarea>
        } @else {
          <input matInput [type]="field.type" [formControlName]="field.key" />
        }
      </mat-form-field>
    }
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-flat-button color="primary" (click)="save()">Save</button>
</mat-dialog-actions>
