<div class="page">
  <app-page-header
    [breadcrumb]="'Client / Outlets'"
    [title]="'Outlet List'"
    [subtitle]="'Manage outlets for the selected client'"
    [actions]="headerActions"
  ></app-page-header>

  <div class="page-content">
    <div class="card">
      <app-data-table
        [columns]="columns"
        [data]="outlets()"
        [loading]="loading()"
        [emptyMessage]="'No outlets found for this client'"
        (edit)="openEditDialog($event)"
        (delete)="confirmDelete($event)"
        (rowClick)="openDetails($event)"
      ></app-data-table>
    </div>
  </div>
</div>
