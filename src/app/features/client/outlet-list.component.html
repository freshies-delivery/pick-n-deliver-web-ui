<app-breadcrumbs
  [items]="[
    { label: 'Client', link: '/client/clients' },
    { label: 'Clients', link: '/client/clients' },
    { label: 'Outlets' }
  ]"
/>

<mat-card>
  <mat-card-header>
    <mat-card-title>Outlet List</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="actions">
      <button mat-flat-button color="primary" (click)="openCreateDialog()">Add Outlet</button>
    </div>

    <app-generic-table
      [columns]="columns"
      [data]="outlets()"
      [loading]="loading()"
      [emptyMessage]="'No outlets found for this client'"
      (edit)="openEditDialog($event)"
      (delete)="confirmDelete($event)"
      (rowClick)="openDetails($event)"
    />
  </mat-card-content>
</mat-card>
