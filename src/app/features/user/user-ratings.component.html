<div class="page">
  <app-page-header
    [breadcrumb]="'User View / Users'"
    [title]="'Ratings'"
    [subtitle]="'Ratings received by ' + userLabel()"
  ></app-page-header>

  <div class="user-tabs">
    <a class="user-tab" [routerLink]="['/dashboard/users', userId(), 'orders']" routerLinkActive="active">Orders</a>
    <a class="user-tab" [routerLink]="['/dashboard/users', userId(), 'addresses']" routerLinkActive="active">Addresses</a>
    <a class="user-tab" [routerLink]="['/dashboard/users', userId(), 'activity']" routerLinkActive="active">Activity</a>
  </div>

  <div class="page-content">
    <div class="card">
      <app-data-table
        [columns]="columns"
        [data]="ratings()"
        [loading]="loading()"
        [clickableRows]="false"
        [emptyMessage]="'No ratings found for this user'"
      ></app-data-table>
    </div>
  </div>
</div>
