<div class="img-search">
  <div class="img-search-label">Image URL <span class="optional">(optional)</span></div>

  <div class="img-search-row">
    <input
      class="form-input img-url-input"
      type="url"
      [placeholder]="initialQuery ? 'Paste image URL for ' + initialQuery : 'Paste image URL…'"
      [value]="urlInput()"
      (input)="onUrlChange($any($event.target).value)"
    />
    @if (urlInput()) {
      <button class="img-clear-btn" type="button" (click)="clear()">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M1 1l10 10M11 1L1 11"/>
        </svg>
      </button>
    }
  </div>

  @if (preview() && !error()) {
    <div class="img-preview">
      <img [src]="preview()" [alt]="initialQuery" (error)="onImgError()" />
      <div class="img-preview-label">Preview</div>
    </div>
  }

  @if (error()) {
    <div class="img-error">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="8" cy="8" r="7"/><path d="M8 5v3M8 11v.5"/>
      </svg>
      Could not load image — check the URL
    </div>
  }
</div>
