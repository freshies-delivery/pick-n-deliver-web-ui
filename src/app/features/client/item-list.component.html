<app-breadcrumbs
  [items]="[
    { label: 'Client', link: '/client/clients' },
    { label: 'Outlets', link: '/client/' + clientId() + '/outlets' },
    { label: 'Outlet Detail', link: '/client/' + clientId() + '/outlets/' + outletId() },
    { label: 'Items' }
  ]"
/>

<mat-card>
  <mat-card-header>
    <mat-card-title>Items for Category {{ categoryId() }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="actions">
      <button mat-flat-button color="primary" (click)="openCreateDialog()">Add Item</button>
    </div>

    <app-generic-table
      [columns]="columns"
      [data]="items()"
      [loading]="loading()"
      [emptyMessage]="'No items in this category'"
      (edit)="openEditDialog($event)"
      (delete)="confirmDelete($event)"
      [clickableRows]="false"
    />
  </mat-card-content>
</mat-card>
