<aside class="sidebar">
  <!-- Brand -->
  <div class="brand">
    <div class="logo-mark">
      <svg width="32" height="32" viewBox="0 0 20 20" fill="none">
        <rect width="20" height="20" rx="9" fill="url(#lg)"/>
        <rect x="3" y="3" width="14" height="14" rx="2.5" fill="rgba(255,255,255,0.15)"/>
        <path d="M6 9l2.5 2.5L12 6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M5 12.5h3M5 14.5h5" stroke="rgba(255,255,255,0.55)" stroke-width="1.3" stroke-linecap="round"/>
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="20" y2="20" gradientUnits="userSpaceOnUse">
            <stop stop-color="#6366F1"/><stop offset="1" stop-color="#A855F7"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <span class="brand-text">Swift<span class="brand-gradient">ly</span></span>
  </div>

  <nav class="nav" aria-label="Main navigation">

    <!-- Overview -->
    <div class="nav-item" [class.active]="isRouteExact('/dashboard')" (click)="navigateOverview()">
      <div class="nav-icon">
        <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
      </div>
      <span class="nav-label">Overview</span>
    </div>

    <!-- Client View section -->
    <div class="nav-section-label">Client View</div>

    <div class="nav-item" [class.active]="isRouteActive('/dashboard/clients/explore')" (click)="navigateExplore()">
      <div class="nav-icon">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="6.5" cy="6.5" r="5"/><line x1="10.5" y1="10.5" x2="14.5" y2="14.5"/>
        </svg>
      </div>
      <span class="nav-label">Explore</span>
    </div>

    <div class="nav-item" [class.active]="isRouteActive('/dashboard/clients/list')" (click)="navigateClientList()">
      <div class="nav-icon">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="5" height="5" rx="1.5"/><rect x="9" y="2" width="5" height="5" rx="1.5"/>
          <rect x="2" y="9" width="5" height="5" rx="1.5"/><rect x="9" y="9" width="5" height="5" rx="1.5"/>
        </svg>
      </div>
      <span class="nav-label">All Clients</span>
      @if (clientCount() > 0) {
        <span class="nav-badge">{{ clientCount() }}</span>
      }
    </div>

    <!-- User View section -->
    <div class="nav-section-label">User View</div>

    <div class="nav-item" [class.active]="isRouteActive('/dashboard/users/explore')" (click)="navigateUserExplore()">
      <div class="nav-icon">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="6.5" cy="6.5" r="5"/><line x1="10.5" y1="10.5" x2="14.5" y2="14.5"/>
        </svg>
      </div>
      <span class="nav-label">Explore</span>
    </div>

    <div class="nav-item" [class.active]="isRouteActive('/dashboard/users/list')" (click)="navigateAllUsers()">
      <div class="nav-icon">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="5.5" r="2.5"/><path d="M3 14c0-2.8 2.2-5 5-5s5 2.2 5 5"/>
        </svg>
      </div>
      <span class="nav-label">All Users</span>
    </div>

    <!-- Admin Panel section -->
    <div class="nav-section-label">Admin Panel</div>

    <div class="nav-item nav-item--child" [class.active]="isRouteActive('/dashboard/admin/segments')" (click)="navigateSegments()">
      <div class="nav-icon">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <circle cx="4" cy="8" r="2"/><circle cx="12" cy="4" r="2"/><circle cx="12" cy="12" r="2"/>
          <path d="M6 8h3M10.3 5.1L6.7 6.9M10.3 10.9L6.7 9.1"/>
        </svg>
      </div>
      <span class="nav-label">Segments</span>
    </div>

    <div class="nav-item nav-item--child" [class.active]="isRouteActive('/dashboard/admin/config')" (click)="navigateConfig()">
      <div class="nav-icon">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="12" height="12" rx="1.5"/><path d="M5 5h6M5 8h6M5 11h3"/>
        </svg>
      </div>
      <span class="nav-label">Config</span>
    </div>

    <div class="nav-item nav-item--child" [class.active]="isRouteActive('/dashboard/admin/offers')" (click)="navigateOffers()">
      <div class="nav-icon">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 8h2l2-5 2 10 2-7 1 2h3"/>
        </svg>
      </div>
      <span class="nav-label">Offers</span>
    </div>

    <div class="nav-item nav-item--child" [class.active]="isRouteActive('/dashboard/admin/notifications')" (click)="navigateNotifications()">
      <div class="nav-icon">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 7A5 5 0 103 7c0 2 .5 3 1 3.5H2l1 2h10l1-2h-2C13.5 10 13 9 13 7z"/>
        </svg>
      </div>
      <span class="nav-label">Notifications</span>
      @if (unreadCount() > 0) {
        <span class="nav-badge alert">{{ unreadCount() }}</span>
      }
    </div>

  </nav>
</aside>
