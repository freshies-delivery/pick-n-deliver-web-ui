@if (total > pageSize) {
  <div class="pager">
    <span class="pager-info">Showing {{ startItem }}–{{ endItem }} of {{ total }}</span>
    <div class="pager-nav">
      <button class="pager-btn" type="button" [disabled]="currentPage === 1" (click)="prev()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 12L6 8l4-4"/>
        </svg>
      </button>
      @for (p of visiblePages; track $index) {
        <button class="pager-num" type="button"
                [class.active]="p === currentPage"
                [class.ellipsis]="p === '...'"
                [disabled]="p === '...'"
                (click)="go(p)">{{ p }}</button>
      }
      <button class="pager-btn" type="button" [disabled]="currentPage === totalPages" (click)="next()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 4l4 4-4 4"/>
        </svg>
      </button>
    </div>
  </div>
}
