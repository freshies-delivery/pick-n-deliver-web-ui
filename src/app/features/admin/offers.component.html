<div class="page">
  <app-page-header
    [breadcrumb]="'Admin / Offers'"
    [title]="'Offers'"
    [subtitle]="offers().length + ' offers'"
  />

  <app-stats-strip [stats]="statsStrip()" />

  <app-page-toolbar
    searchPlaceholder="Search offers…"
    [filterOptions]="filterOptions()"
    [activeFilter]="filter()"
    (searchChange)="searchQuery.set($event); currentPage.set(1)"
    (filterChange)="filter.set($event); currentPage.set(1)"
  />

  <div class="list-body">
    @if (loading()) {
      <app-skeleton-list [rows]="6" />
    } @else if (filteredOffers().length === 0) {
      <app-empty-state
        title="No offers found"
        message="Try adjusting your search or filter to find what you're looking for."
      />
    } @else {
      <div class="offers-list">
        @for (offer of pagedOffers(); track offer.id) {
          <app-rich-list-item
            [id]="offer.id"
            [name]="offer.name"
            [description]="offer.code"
            [category]="discountLabel(offer)"
            [status]="offer.status"
            [stats]="offerStats(offer)"
            [showEdit]="false"
            [showDelete]="false"
            [accentBar]="true"
          />
        }
      </div>

      <app-pagination
        [total]="filteredOffers().length"
        [pageSize]="pageSize"
        [currentPage]="currentPage()"
        (pageChange)="currentPage.set($event)"
      />
    }
  </div>
</div>
