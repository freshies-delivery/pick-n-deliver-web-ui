<div class="page">
  <app-page-header
    [breadcrumb]="'User View / Users'"
    [title]="'Orders'"
    [subtitle]="'Orders for ' + userLabel()"
  ></app-page-header>

  <div class="page-content">
    <div class="card">
      <app-data-table
        [columns]="columns"
        [data]="orders()"
        [loading]="loading()"
        [clickableRows]="false"
        [emptyMessage]="'No orders found for this user'"
      ></app-data-table>
    </div>
  </div>
</div>
