<div class="modal-card" [class]="size">
  <div class="modal-header">
    <div class="modal-header-left">
      @if (hasIcon) {
        <div class="modal-icon">
          <ng-content select="[icon]"/>
        </div>
      }
      <div>
        <div class="modal-title">{{ title }}</div>
        @if (subtitle) {
          <div class="modal-subtitle">{{ subtitle }}</div>
        }
      </div>
    </div>
    <button class="modal-close" type="button" (click)="closeRequested.emit()">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M1 1l10 10M11 1L1 11"/>
      </svg>
    </button>
  </div>

  <div class="modal-body">
    <ng-content/>
  </div>

  <div class="modal-footer">
    <button class="btn-cancel" type="button" (click)="closeRequested.emit()">Cancel</button>
    <ng-content select="[footer]"/>
  </div>
</div>
