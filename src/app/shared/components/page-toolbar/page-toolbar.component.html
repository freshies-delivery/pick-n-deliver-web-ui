<div class="toolbar">
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <circle cx="6.5" cy="6.5" r="4.5"/><path d="M10 10l3.5 3.5"/>
    </svg>
    <input class="search-input" type="search"
           [placeholder]="searchPlaceholder"
           (input)="onSearch($event)" />
  </div>

  @if (filterOptions.length > 0) {
    <div class="filter-pills">
      @for (opt of filterOptions; track opt.value) {
        <button type="button"
                class="filter-pill"
                [class.active]="activeFilter === opt.value"
                (click)="filterChange.emit(opt.value)">
          {{ opt.label }}
          @if (opt.count !== undefined) {
            <span class="pill-count">{{ opt.count }}</span>
          }
        </button>
      }
    </div>
  }

  @if (showViewToggle) {
    <div class="view-toggle">
      <button type="button" class="view-btn" [class.active]="currentView === 'list'" (click)="viewChange.emit('list')" title="List view">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M2 4h12M2 8h12M2 12h12"/>
        </svg>
      </button>
      <button type="button" class="view-btn" [class.active]="currentView === 'grid'" (click)="viewChange.emit('grid')" title="Grid view">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/>
          <rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/>
        </svg>
      </button>
    </div>
  }
</div>
