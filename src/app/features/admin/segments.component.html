<div class="page">
  <app-page-header
    [breadcrumb]="'Admin / Segments'"
    [title]="'Segments'"
    [subtitle]="segments().length + ' segments'"
  />

  <app-stats-strip [stats]="statsStrip()" />

  <app-page-toolbar
    searchPlaceholder="Search segments…"
    [filterOptions]="filterOptions()"
    [activeFilter]="activeFilter()"
    (searchChange)="searchQuery.set($event); currentPage.set(1)"
    (filterChange)="activeFilter.set($event); currentPage.set(1)"
  />

  <div class="list-body">
    @if (loading()) {
      <app-skeleton-list [rows]="6" />
    } @else if (filteredSegments().length === 0) {
      <app-empty-state
        title="No segments found"
        message="Try adjusting your search or filter to find what you're looking for."
      />
    } @else {
      <div class="segments-list">
        @for (seg of pagedSegments(); track seg.id) {
          <app-rich-list-item
            [id]="seg.id"
            [name]="seg.name"
            [description]="seg.description"
            [category]="seg.isActive ? 'active' : 'inactive'"
            [status]="seg.isActive ? 'active' : 'inactive'"
            [stats]="segmentStats(seg)"
            [badges]="[seg.criteriaReadable]"
            [avatarInitials]="seg.name.charAt(0)"
            [showEdit]="false"
            [showDelete]="false"
            [accentBar]="true"
            [style.--bar-gradient]="'linear-gradient(135deg, ' + seg.color + ', ' + seg.color + '88)'"
          />
        }
      </div>

      <app-pagination
        [total]="filteredSegments().length"
        [pageSize]="pageSize"
        [currentPage]="currentPage()"
        (pageChange)="currentPage.set($event)"
      />
    }
  </div>
</div>
