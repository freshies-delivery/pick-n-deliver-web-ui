<div class="rm-wrap">

  <!-- Header -->
  <div class="rm-header">
    <div class="rm-header-left">
      <div class="rm-icon">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v14l4-2 2 2 2-2 4 2V4a2 2 0 0 0-2-2z"/>
          <path d="M8 7h4M8 11h4M8 15h2"/>
        </svg>
      </div>
      <div>
        <div class="rm-title">Generate {{ typeLabel() }} Report</div>
        <div class="rm-subtitle">{{ data.label }}</div>
      </div>
    </div>
    <button class="rm-close" type="button" (click)="close()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <path d="M1 1l12 12M13 1L1 13"/>
      </svg>
    </button>
  </div>

  <!-- Body -->
  <div class="rm-body">

    <!-- Period -->
    <div class="rm-section">
      <div class="rm-label">Report Period</div>
      <div class="rm-chips">
        @for (p of periods; track p.days) {
          <button type="button" class="rm-chip" [class.active]="selectedDays() === p.days"
                  (click)="selectPeriod(p.days)">{{ p.label }}</button>
        }
      </div>
    </div>

    <!-- Format -->
    <div class="rm-section">
      <div class="rm-label">Export Format</div>
      <div class="rm-formats">
        <button type="button" class="rm-fmt-btn" [class.active]="selectedFormat() === 'excel'"
                (click)="selectFormat('excel')">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <rect x="3" y="3" width="14" height="14" rx="2"/>
            <path d="M7 7l6 6M13 7l-6 6"/>
          </svg>
          Excel (.xlsx)
        </button>
        <button type="button" class="rm-fmt-btn" [class.active]="selectedFormat() === 'pdf'"
                (click)="selectFormat('pdf')">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v14l4-2 2 2 2-2 4 2V4a2 2 0 0 0-2-2z"/>
            <path d="M8 9h4M8 13h2"/>
          </svg>
          PDF (.pdf)
        </button>
      </div>
    </div>

    <!-- Summary -->
    <div class="rm-summary">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/>
      </svg>
      Last <strong>{{ selectedPeriodLabel() }}</strong> &nbsp;·&nbsp;
      <strong>{{ selectedFormat() === 'excel' ? 'Excel spreadsheet' : 'PDF document' }}</strong>
    </div>

    <!-- Error -->
    @if (error()) {
      <div class="rm-error">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <circle cx="8" cy="8" r="6"/><path d="M8 5v3m0 3h.01"/>
        </svg>
        {{ error() }}
      </div>
    }

  </div>

  <!-- Footer -->
  <div class="rm-footer">
    <button type="button" class="rm-cancel-btn" (click)="close()">Cancel</button>
    <button type="button" class="rm-download-btn" [disabled]="downloading()" (click)="download()">
      @if (downloading()) {
        <span class="rm-spinner"></span>
        Generating…
      } @else {
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M8 2v9M4 7l4 4 4-4"/><path d="M2 13h12"/>
        </svg>
        Download Report
      }
    </button>
  </div>

</div>
