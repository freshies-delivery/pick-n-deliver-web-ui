<div class="page">
  <app-page-header
    [breadcrumb]="'Admin / Notifications'"
    [title]="'Notifications'"
    [subtitle]="notifications().length + ' notifications'"
  />

  <app-stats-strip [stats]="statsStrip()" />

  <app-page-toolbar
    searchPlaceholder="Search notifications…"
    [filterOptions]="filterOptions()"
    [activeFilter]="activeFilter()"
    (searchChange)="searchQuery.set($event); currentPage.set(1)"
    (filterChange)="activeFilter.set($event); currentPage.set(1)"
  />

  <div class="list-body">
    @if (loading()) {
      <app-skeleton-list [rows]="6" />
    } @else if (filteredNotifications().length === 0) {
      <app-empty-state
        title="No notifications found"
        message="Try adjusting your search or filter to find what you're looking for."
      />
    } @else {
      <div class="notif-list">
        @for (notif of pagedNotifications(); track notif.id) {
          <app-rich-list-item
            [id]="notif.id"
            [name]="notif.title"
            [description]="notif.message"
            [category]="notif.channel"
            [status]="notif.status"
            [stats]="notifStats(notif)"
            [showEdit]="false"
            [showDelete]="false"
            [accentBar]="false"
          />
        }
      </div>

      <app-pagination
        [total]="filteredNotifications().length"
        [pageSize]="pageSize"
        [currentPage]="currentPage()"
        (pageChange)="currentPage.set($event)"
      />
    }
  </div>
</div>
