<div class="page items-page" @fadeIn>
  <app-page-header
    [breadcrumb]="'Client / Outlets / Categories'"
    [title]="'Items'"
    [subtitle]="'Manage all items in this category'"
    [actions]="headerActions"
  ></app-page-header>

  <div class="page-content">
    @if (viewMode() === 'table') {
      <div class="card">
        <app-data-table
          [columns]="columns"
          [data]="visibleItems()"
          [searchTerm]="searchQuery()"
          [loading]="loading()"
          [emptyMessage]="'No items found'"
          (edit)="openEditDialog($event)"
          (delete)="confirmDelete($event)"
          [clickableRows]="false"
          [pageSize]="10"
          [pageSizeOptions]="[5, 10, 25, 50]"
        ></app-data-table>
      </div>
    } @else {
      <div class="grid-placeholder card">
        <mat-icon>grid_view</mat-icon>
        <h3>Grid view coming soon</h3>
        <p>Switch back to table mode to manage items.</p>
      </div>
    }
  </div>
</div>
